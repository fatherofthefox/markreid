kind = "web"
previewPath = "/"
title = "Mark Reid - Personal Website"
version = "1.0.0"
id = "artifacts/mark-reid-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26181

[services.development]
run = "pnpm --filter @workspace/mark-reid-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mark-reid-site", "run", "build" ]
publicDir = "artifacts/mark-reid-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26181"
BASE_PATH = "/"
