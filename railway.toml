[build]
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/mark-reid-site build && pnpm --filter @workspace/api-server build"

[deploy]
startCommand = "pnpm --filter @workspace/api-server start"
healthcheckPath = "/api/health/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
